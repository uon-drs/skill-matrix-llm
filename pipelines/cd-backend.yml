# CD — Backend (.NET API)
#
# Progressively deploys the backend API artifact across environments: uat → prod.
# Each stage uses an Azure DevOps 'deployment' job linked to an ADO Environment.
# Configure approval gates on 'templateapp-uat' and 'templateapp-prod' in the ADO UI.
#
# This pipeline is triggered automatically when 'CI - Backend' completes on the main branch.
# It can also be run manually with a 'startEnvironment' parameter to deploy directly to prod.

trigger: none

parameters:
  - name: startEnvironment
    displayName: 'Start from environment (skips earlier stages)'
    type: string
    default: 'uat'
    values:
      - uat
      - prod

variables:
  - template: variables/common.yml

# Triggered automatically after CI succeeds on main
resources:
  pipelines:
    - pipeline: ci-backend
      source: 'CI - Backend'
      trigger:
        branches:
          include:
            - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  # ============================================================
  - stage: Deploy_UAT
    displayName: 'Deploy to UAT'
    condition: >
      and(
        succeeded(),
        in('${{ parameters.startEnvironment }}', 'uat')
      )
    variables:
      - template: variables/uat.yml
    jobs:
      - deployment: DeployApi
        displayName: 'Deploy API to uat'
        # Approval gates are configured in the ADO Environment 'templateapp-uat' — not here
        environment: '$(appBaseName)-uat'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: 'Download api-drop artifact'
                  inputs:
                    buildType: specific
                    project: $(System.TeamProject)
                    definition: 'CI - Backend'
                    buildVersionToDownload: latestFromBranch
                    branchName: 'refs/heads/main'
                    artifactName: 'api-drop'
                    targetPath: '$(Pipeline.Workspace)/api-drop'

                - task: AzureWebApp@1
                  displayName: 'Deploy to App Service (uat)'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: 'webAppLinux'
                    appName: '$(appBaseName)-$(environment)-api'
                    resourceGroupName: $(resourceGroupName)
                    package: '$(Pipeline.Workspace)/api-drop/**/*.zip'
                    runtimeStack: 'DOTNETCORE|10.0'

  # ============================================================
  - stage: Deploy_Prod
    displayName: 'Deploy to Production'
    dependsOn: Deploy_UAT
    condition: >
      and(
        in(dependencies.Deploy_UAT.result, 'Succeeded', 'Skipped'),
        in('${{ parameters.startEnvironment }}', 'uat', 'prod')
      )
    variables:
      - template: variables/prod.yml
    jobs:
      - deployment: DeployApi
        displayName: 'Deploy API to prod'
        # Approval gates are configured in the ADO Environment 'templateapp-prod' — not here
        environment: '$(appBaseName)-prod'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: 'Download api-drop artifact'
                  inputs:
                    buildType: specific
                    project: $(System.TeamProject)
                    definition: 'CI - Backend'
                    buildVersionToDownload: latestFromBranch
                    branchName: 'refs/heads/main'
                    artifactName: 'api-drop'
                    targetPath: '$(Pipeline.Workspace)/api-drop'

                - task: AzureWebApp@1
                  displayName: 'Deploy to App Service (prod)'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: 'webAppLinux'
                    appName: '$(appBaseName)-$(environment)-api'
                    resourceGroupName: $(resourceGroupName)
                    package: '$(Pipeline.Workspace)/api-drop/**/*.zip'
                    runtimeStack: 'DOTNETCORE|10.0'
