services:
  # ──────────────────────────────────────────
  # App database
  # Connection string: Host=localhost;Port=5432;Database=templateapp;Username=templateapp;Password=dev_password
  # ──────────────────────────────────────────
  postgres-app:
    image: postgres:16
    environment:
      POSTGRES_DB: templateapp
      POSTGRES_USER: templateapp
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-app-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U templateapp -d templateapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Keycloak database (separate instance to keep concerns isolated)
  # Exposed on 5433 to avoid conflicting with the app DB
  # ──────────────────────────────────────────
  postgres-keycloak:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    ports:
      - "5433:5432"
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Keycloak
  # Admin console: http://localhost:8080
  # Admin credentials: admin / admin
  # Issuer URL (for .env.local): http://localhost:8080/realms/<your-realm>
  # ──────────────────────────────────────────
  keycloak:
    image: keycloak/keycloak:26.6
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy

  # ──────────────────────────────────────────
  # Azurite
  # -─────────────────────────────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    restart: always
    ports:
      - 10000:10000
      - 10001:10001
      - 10002:10002

  # ──────────────────────────────────────────
  # Azure storage web explorer
  # Provides a UI to interact with Azurite
  # Access via http://localhost:8081
  # -─────────────────────────────────────────
  azure-storage-web-explorer:
    restart: always
    image: sebagomez/azurestorageexplorer
    ports:
      - 8081:8080
    environment:
      - AZURE_STORAGE_CONNECTIONSTRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      - AZURITE=true
    depends_on:
      - azurite

  # ──────────────────────────────────────────
  # MailHog
  # Simple email testing tool, which captures outgoing emails and provides a web UI to view them.
  # Access via http://localhost:8025
  # ──────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog
    restart: always
    container_name: mailhog
    logging:
      driver: 'none'
    ports:
      - 1025:1025
      - 8025:8025

volumes:
  postgres-app-data:
  postgres-keycloak-data:
